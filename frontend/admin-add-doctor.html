<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand"><div class="brand-mark">+</div><span>Hospital CMS</span></div>
        <nav><a href="index.html">Home</a><a href="admin-login.html">Logout</a></nav>
    </header>
    <main class="hero">
        <section class="form-card">
            <h1>Add <span>Doctor</span></h1>
            <form class="form-grid two-col">
                <label>Doctor Name<input type="text" value="Dr. Alice Brown"></label>
                <label>Specialization<input type="text" value="Dermatologist"></label>
                <label>Email<input type="email" value="dr.alice@example.com"></label>
                <label>Phone Number<input type="text" value="555-1004"></label>
                <button class="btn primary full-span" type="button">Save Doctor</button>
            </form>
        </section>
    </main>
</body>
