<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital CMS Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand"><div class="brand-mark">+</div><span>Hospital CMS</span></div>
        <nav><a href="index.html">Home</a><a href="login.html">Login</a></nav>
    </header>
    <main class="hero">
        <section class="form-card compact">
            <h1>Create Account</h1>
            <form class="form-grid">
                <label>Full Name<input type="text" placeholder="Jane Doe"></label>
                <label>Email<input type="email" placeholder="jane@example.com"></label>
                <label>Role<select><option>Patient</option><option>Doctor</option><option>Admin</option></select></label>
                <button class="btn primary" type="button">Sign Up</button>
            </form>
        </section>
    </main>
</body>
</html>
