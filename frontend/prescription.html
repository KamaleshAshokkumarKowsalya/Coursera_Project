<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Prescription</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand"><div class="brand-mark">+</div><span>Hospital CMS</span></div>
        <nav><a href="index.html">Home</a><a href="login.html">Logout</a></nav>
    </header>
    <main class="hero">
        <section class="form-card">
            <h1>View <span>Prescription</span></h1>
            <form class="form-grid">
                <label>Patient Name<input type="text" value="John Smith"></label>
                <label>Medicine Names<input type="text" value="Vitamin C tablets"></label>
                <label>Dosage Instructions<textarea rows="3">Twice a day</textarea></label>
                <label>Additional Notes<textarea rows="3">NA</textarea></label>
                <button class="btn ghost" type="button">Cancel</button>
            </form>
        </section>
    </main>
</body>
</html>
