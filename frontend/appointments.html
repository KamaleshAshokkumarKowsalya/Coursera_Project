<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Appointment</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="brand"><div class="brand-mark">+</div><span>Hospital CMS</span></div>
        <nav><a href="index.html">Home</a><a href="login.html">Logout</a></nav>
    </header>
    <main class="hero">
        <section class="form-card">
            <h1>Update <span>Appointment</span></h1>
            <form class="form-grid">
                <label>Patient Name<input type="text" value="John Smith"></label>
                <label>Doctor Name<input type="text" value="John Smith"></label>
                <label>Date<input type="date" value="2025-05-22"></label>
                <label>Time<select><option>09:00-10:00</option><option>10:00-11:00</option></select></label>
                <button class="btn primary" type="button">Update Appointment</button>
                <button class="btn ghost" type="button">Cancel</button>
            </form>
        </section>
    </main>
</body>
</html>
